defaults:
  slot_duration_ms: 100
  episode_steps: 80
  quick_episode_steps: 12
  queue_horizon_ms: 400.0
  queue_reservation_factor: 0.3
  robot_speed_range_mps: [1.5, 2.0]
  robot_working_speed_range_mps: [0.5, 1.5]
  robot_payload_range_kg: [100.0, 150.0]
  mission_importance_range: [0.9, 1.3]
  local_edge_latency_ms: [2.0, 10.0]
  degraded_latency_ms: [20.0, 150.0]
  video_like_input_rate_mbps: [17.0, 35.0]
  high_speed_link_mbps: [600.0, 2000.0]
  constrained_link_mbps: [30.0, 100.0]
  fixed_operation_mode: normal
  random_mode_baseline_seed_offset: 1000

sizes:
  Warehouse-S:
    robots: 6
    access_points: 7
    edge_nodes: 4
    width_m: 36
    height_m: 24
  Warehouse-M:
    robots: 10
    access_points: 25
    edge_nodes: 5
    width_m: 60
    height_m: 36
  Warehouse-M+:
    robots: 10
    access_points: 25
    edge_nodes: 13
    width_m: 60
    height_m: 36
  Warehouse-L:
    robots: 20
    access_points: 40
    edge_nodes: 10
    width_m: 90
    height_m: 54
  Warehouse-XL:
    robots: 40
    access_points: 60
    edge_nodes: 20
    width_m: 120
    height_m: 72

edge_node_classes:
  Edge-S:
    cpu_capacity_norm: 1.0
    memory_capacity_norm: 1.0
    gpu_capacity_norm: 1.0
  Edge-M:
    cpu_capacity_norm: 2.0
    memory_capacity_norm: 2.0
    gpu_capacity_norm: 3.0
  Edge-GPU:
    cpu_capacity_norm: 4.0
    memory_capacity_norm: 4.0
    gpu_capacity_norm: 8.0

operation_modes:
  safe:
    cpu_exposure: 0.30
    memory_exposure: 0.30
    gpu_exposure: 0.30
  normal:
    cpu_exposure: 0.60
    memory_exposure: 0.60
    gpu_exposure: 0.60
  aggressive:
    cpu_exposure: 0.90
    memory_exposure: 0.90
    gpu_exposure: 0.90
  reserve:
    cpu_exposure: 0.45
    memory_exposure: 0.45
    gpu_exposure: 0.45
  critical:
    cpu_exposure: 0.70
    memory_exposure: 0.70
    gpu_exposure: 0.70
    priority_boost_task_classes:
      - obstacle_detection
      - localization_slam
      - path_replanning
    priority_boost: 1.15

task_classes:
  obstacle_detection:
    arrival_weight: 0.20
    base_value: 14.0
    deadline_ms: [33.0, 100.0]
    input_size_mbit: [0.2, 4.5]
    output_size_mbit: [0.02, 0.35]
    cpu_required: [0.40, 0.75]
    memory_required: [0.20, 0.45]
    gpu_required: [0.30, 0.70]
    hard_deadline_probability: 0.75
    deadline_sensitivity: 2.0
    service_time_ms: [8.0, 36.0]
    priority_range: [4, 5]
  perception:
    arrival_weight: 0.18
    base_value: 12.5
    deadline_ms: [50.0, 200.0]
    input_size_mbit: [1.0, 10.0]
    output_size_mbit: [0.1, 0.8]
    cpu_required: [0.35, 0.65]
    memory_required: [0.25, 0.55]
    gpu_required: [0.25, 0.70]
    hard_deadline_probability: 0.55
    deadline_sensitivity: 1.7
    service_time_ms: [15.0, 80.0]
    priority_range: [3, 5]
  localization_slam:
    arrival_weight: 0.16
    base_value: 11.5
    deadline_ms: [100.0, 500.0]
    input_size_mbit: [0.5, 5.0]
    output_size_mbit: [0.05, 0.6]
    cpu_required: [0.30, 0.55]
    memory_required: [0.20, 0.50]
    gpu_required: [0.00, 0.35]
    hard_deadline_probability: 0.35
    deadline_sensitivity: 1.2
    service_time_ms: [20.0, 95.0]
    priority_range: [3, 5]
  path_replanning:
    arrival_weight: 0.14
    base_value: 10.5
    deadline_ms: [100.0, 500.0]
    input_size_mbit: [0.1, 2.0]
    output_size_mbit: [0.05, 0.25]
    cpu_required: [0.18, 0.45]
    memory_required: [0.12, 0.30]
    gpu_required: [0.00, 0.20]
    hard_deadline_probability: 0.35
    deadline_sensitivity: 1.1
    service_time_ms: [12.0, 60.0]
    priority_range: [2, 4]
  inventory_recognition:
    arrival_weight: 0.17
    base_value: 9.0
    deadline_ms: [500.0, 2000.0]
    input_size_mbit: [1.0, 20.0]
    output_size_mbit: [0.2, 1.5]
    cpu_required: [0.28, 0.55]
    memory_required: [0.20, 0.60]
    gpu_required: [0.00, 0.55]
    hard_deadline_probability: 0.10
    deadline_sensitivity: 0.6
    service_time_ms: [35.0, 150.0]
    priority_range: [1, 4]
  telemetry_diagnostics:
    arrival_weight: 0.15
    base_value: 5.5
    deadline_ms: [1000.0, 10000.0]
    input_size_mbit: [0.01, 1.0]
    output_size_mbit: [0.01, 0.15]
    cpu_required: [0.05, 0.20]
    memory_required: [0.05, 0.15]
    gpu_required: [0.00, 0.00]
    hard_deadline_probability: 0.0
    deadline_sensitivity: 0.15
    service_time_ms: [8.0, 55.0]
    priority_range: [1, 3]

qmix:
  hidden_dim: 64
  mixing_hidden_dim: 64
  learning_rate: 0.0007
  gamma: 0.97
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 1500
  replay_capacity: 4000
  batch_size: 32
  target_update_interval: 80
  training_episodes: 24
  training_scenarios:
    - stable_warehouse_load
  checkpoint_dir: experiments/checkpoints

scenarios:
  stable_warehouse_load:
    default_size: Warehouse-M
    episode_steps: 80
    arrival_rate_per_robot: 0.22
    scenario_group: stable
    task_mix:
      obstacle_detection: 0.22
      perception: 0.18
      localization_slam: 0.16
      path_replanning: 0.16
      inventory_recognition: 0.14
      telemetry_diagnostics: 0.14
    heterogeneous_node_mix:
      Edge-S: 0.40
      Edge-M: 0.40
      Edge-GPU: 0.20
    cluster_target_size: 3
  peak_warehouse_load:
    default_size: Warehouse-M
    episode_steps: 90
    arrival_rate_per_robot: 0.18
    peak_spike_multiplier: 3.0
    peak_start_step: 20
    peak_duration_steps: 30
    scenario_group: peak
    heterogeneous_node_mix:
      Edge-S: 0.35
      Edge-M: 0.40
      Edge-GPU: 0.25
    cluster_target_size: 3
  heterogeneous_edge_nodes:
    default_size: Warehouse-M+
    episode_steps: 80
    arrival_rate_per_robot: 0.20
    scenario_group: heterogeneous
    heterogeneous_node_mix:
      Edge-S: 0.30
      Edge-M: 0.35
      Edge-GPU: 0.35
    cluster_target_size: 4
  network_degradation:
    default_size: Warehouse-M
    episode_steps: 80
    arrival_rate_per_robot: 0.20
    degraded_region_fraction: 0.45
    degradation_start_step: 16
    degradation_duration_steps: 28
    scenario_group: network_degradation
    heterogeneous_node_mix:
      Edge-S: 0.30
      Edge-M: 0.45
      Edge-GPU: 0.25
    cluster_target_size: 3
  edge_node_failures:
    default_size: Warehouse-M
    episode_steps: 80
    arrival_rate_per_robot: 0.20
    failure_fraction: 0.20
    failure_start_step: 24
    failure_duration_steps: 24
    enable_recovery: true
    scenario_group: failures
    heterogeneous_node_mix:
      Edge-S: 0.30
      Edge-M: 0.50
      Edge-GPU: 0.20
    cluster_target_size: 3
  scalability_sweep:
    default_size: Warehouse-S
    episode_steps: 60
    arrival_rate_per_robot: 0.16
    scenario_group: scalability
    heterogeneous_node_mix:
      Edge-S: 0.35
      Edge-M: 0.45
      Edge-GPU: 0.20
    cluster_target_size: 4
  clustered_vs_global:
    default_size: Warehouse-L
    episode_steps: 70
    arrival_rate_per_robot: 0.18
    scenario_group: clustered
    heterogeneous_node_mix:
      Edge-S: 0.25
      Edge-M: 0.45
      Edge-GPU: 0.30
    cluster_target_size: 4
  sensitivity_operation_modes:
    default_size: Warehouse-M
    episode_steps: 70
    arrival_rate_per_robot: 0.20
    scenario_group: sensitivity
    heterogeneous_node_mix:
      Edge-S: 0.30
      Edge-M: 0.45
      Edge-GPU: 0.25
    cluster_target_size: 3
    sensitivity_profiles:
      conservative:
        safe: 0.85
        normal: 0.90
        aggressive: 0.92
        reserve: 0.88
        critical: 0.90
      default:
        safe: 1.00
        normal: 1.00
        aggressive: 1.00
        reserve: 1.00
        critical: 1.00
      aggressive_bias:
        safe: 1.05
        normal: 1.08
        aggressive: 1.12
        reserve: 1.05
        critical: 1.10
